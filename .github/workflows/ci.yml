name: Frontend CI (Web)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_REF: ghcr.io/chatfleetoss/chatfleet-web
  LOCAL_IMAGE_TAG: ghcr.io/chatfleetoss/chatfleet-web:ci-${{ github.sha }}

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Type check (PRs, non-blocking)
        if: ${{ github.event_name == 'pull_request' }}
        run: npx tsc --noEmit || true
      - name: Type check (main, non-blocking)
        if: ${{ github.event_name != 'pull_request' }}
        run: npx tsc --noEmit || true
      - name: Build (Next.js)
        run: npm run build
      # Optional: lint can be strict later; keep non-blocking initially
      - name: Lint (non-blocking)
        run: npm run lint || true
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Build image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ env.LOCAL_IMAGE_TAG }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            NEXT_PUBLIC_API_BASE=/api
      - name: Enforce local image size budget
        run: python3 scripts/check_local_image_size.py --image "${{ env.LOCAL_IMAGE_TAG }}" --max-mb 250
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@ff1b8b060f23b650436d419b5e13f67f5d4c3087
      - name: Trivy scan
        run: trivy image --severity HIGH,CRITICAL --ignore-unfixed --no-progress "${{ env.LOCAL_IMAGE_TAG }}"
        continue-on-error: true
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        with:
          args: "detect --no-banner --exit-code 1"
        continue-on-error: true
      - name: SBOM
        uses: anchore/sbom-action@a930d0ac434e3182448fe678398ba5713717112a
        with:
          image: ${{ env.LOCAL_IMAGE_TAG }}
          artifact-name: sbom-web-spdx.json
        continue-on-error: true

  publish-main:
    needs:
      - build-test-scan
      - infra-smoke
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Login to GHCR with default token
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to GHCR with PAT (optional)
        env:
          REGISTRY: ${{ env.REGISTRY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          if [ -n "${GHCR_USERNAME}" ] && [ -n "${GHCR_PAT}" ]; then
            echo "Using PAT login for GHCR"
            echo "${GHCR_PAT}" | docker login "${REGISTRY}" -u "${GHCR_USERNAME}" --password-stdin
          else
            echo "No PAT provided; continuing with default token login"
          fi
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.IMAGE_REF }}
          tags: |
            type=raw,value=edge
            type=raw,value=sha-${{ github.sha }}
      - name: Build and push (multi-arch)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            NEXT_PUBLIC_API_BASE=/api
            BUILD_VERSION=sha-${{ github.sha }}
            BUILD_COMMIT=${{ github.sha }}
          tags: |
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Enforce published image size budget
        run: python3 scripts/check_ghcr_image_size.py --image-ref ghcr.io/chatfleetoss/chatfleet-web:edge --max-compressed-mb 250
      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac
      - name: Cosign sign (keyless)
        run: |
          cosign sign --yes ${{ env.IMAGE_REF }}:edge
          cosign sign --yes ${{ env.IMAGE_REF }}:sha-${{ github.sha }}
      - name: Infra edge validation reminder
        run: |
          {
            echo "## Infra next step"
            echo
            echo "After both backend and frontend \`main\` pipelines publish \`edge\`, run the \`Infra CI\` workflow in \`chatfleet-infra\` with \`workflow_dispatch\` to validate \`CHANNEL=edge\`."
          } >> "$GITHUB_STEP_SUMMARY"

  infra-smoke:
    name: Infra Smoke (stable API + local web)
    needs: build-test-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone infra repo
        run: git clone --depth 1 https://github.com/ChatFleetOSS/chatfleet-infra "$RUNNER_TEMP/chatfleet-infra-src"
      - name: Resolve stable API tag
        run: |
          eval "$(CHANNEL=stable bash "$RUNNER_TEMP/chatfleet-infra-src/scripts/resolve-channel.sh")"
          echo "API_TAG=${API_TAG}" >> "$GITHUB_ENV"
      - name: Pull stable API image
        run: docker pull "ghcr.io/chatfleetoss/chatfleet-api:${API_TAG}"
      - name: Build local web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE=/api \
            --build-arg BUILD_VERSION=ci-local \
            --build-arg BUILD_COMMIT=${{ github.sha }} \
            -t ghcr.io/chatfleetoss/chatfleet-web:ci-local \
            .
      - name: Install stack with local web image
        run: |
          INSTALL_DIR="$RUNNER_TEMP/chatfleet-infra-install" \
          INFRA_SOURCE_DIR="$RUNNER_TEMP/chatfleet-infra-src" \
          SKIP_PULL=1 \
          SKIP_VERIFY=1 \
          WEB_TAG=ci-local \
          CHANNEL=stable \
          bash "$RUNNER_TEMP/chatfleet-infra-src/install.sh"
      - name: Verify running versions
        run: |
          python3 "$RUNNER_TEMP/chatfleet-infra-install/scripts/verify_stack.py" \
            --base-url http://localhost:8080 \
            --expected-web ci-local
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f "$RUNNER_TEMP/chatfleet-infra-install/docker-compose.yml" logs --tail=200
      - name: Cleanup
        if: always()
        run: docker compose -f "$RUNNER_TEMP/chatfleet-infra-install/docker-compose.yml" down -v || true
